<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Rothko PGH" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Rothko · Pittsburgh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #e0d8cc;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
      overflow: hidden;
    }
    header {
      width: 100%;
      padding: 20px 24px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .location-line { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #666; margin-bottom: 3px; }
    .date-line { font-size: 13px; color: #999; }
    .time-line { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; text-align: right; }
    .temp-line { font-size: 13px; color: #999; text-align: right; margin-top: 2px; }
    #painting-wrap {
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #painting-wrap canvas {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      border-radius: 2px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.75), 0 2px 12px rgba(0,0,0,0.5);
      transition: opacity 0.4s ease;
    }
    #status-msg { color: #555; font-size: 13px; letter-spacing: 0.08em; font-style: italic; text-align: center; }
    #error-detail { color: #664444; font-size: 11px; letter-spacing: 0.05em; text-align: center; max-width: 260px; line-height: 1.6; }
    footer { width: 100%; padding: 14px 24px 24px; border-top: 1px solid #1e1e1e; }
    .footer-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .footer-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #555; margin-bottom: 4px; }
    .footer-value { font-size: 15px; color: #ccc; }
    .footer-value.italic { font-style: italic; }
    .byline { margin-top: 12px; font-size: 10px; color: #333; letter-spacing: 0.06em; text-align: center; }
    #refresh-btn {
      display: block; margin: 10px auto 0;
      background: none; border: 1px solid #333; color: #666;
      font-family: Georgia, serif; font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 6px 16px; cursor: pointer; border-radius: 1px;
    }
    #refresh-btn:active { background: #1a1a1a; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="location-line">Pittsburgh, PA</div>
      <div class="date-line" id="date-line">—</div>
    </div>
    <div>
      <div class="time-line" id="time-line">—</div>
      <div class="temp-line" id="temp-line"></div>
    </div>
  </header>

  <div id="painting-wrap">
    <span id="status-msg">Reading the sky…</span>
    <span id="error-detail" style="display:none;"></span>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <footer>
    <div class="footer-row" id="footer-data" style="display:none;">
      <div>
        <div class="footer-label">Condition</div>
        <div class="footer-value" id="condition-val">—</div>
      </div>
      <div style="text-align:right;">
        <div class="footer-label">Mood register</div>
        <div class="footer-value italic" id="mood-val">—</div>
      </div>
    </div>
    <div class="byline">Mark Rothko · American, 1903–1970 · Inspired by rothko.joonas.wtf</div>
    <button id="refresh-btn" onclick="repaint()">New painting</button>
  </footer>

  <script>
    const PALETTES = {
      clear_day:           { mood:"luminous",      field:"#e8d5b0", rects:["#c94f2a","#e8892a","#f2c96e"] },
      clear_night:         { mood:"nocturnal",     field:"#1a1228", rects:["#2d1f4a","#5c2d6e","#8b3a62"] },
      partly_cloudy_day:   { mood:"contemplative", field:"#c9bfad", rects:["#7a5c4a","#b8823c","#d4a86a"] },
      partly_cloudy_night: { mood:"somber",        field:"#1e1e2e", rects:["#3a3050","#5a4a6a","#2e2040"] },
      overcast:            { mood:"heavy",         field:"#8a8a8a", rects:["#4a4040","#6a5a5a","#3a3030"] },
      fog:                 { mood:"ethereal",      field:"#b8c0c8", rects:["#7a8898","#9aaab8","#c8d4dc"] },
      drizzle:             { mood:"melancholic",   field:"#6a7a8a", rects:["#3a5a6a","#4a6a7a","#8a9aaa"] },
      rain:                { mood:"elemental",     field:"#3a4a5a", rects:["#1a2a3a","#2a3a4a","#5a6a7a"] },
      thunderstorm:        { mood:"doom",          field:"#1a1a2a", rects:["#0a0a1a","#3a1a0a","#4a2a1a"] },
      snow:                { mood:"hushed",        field:"#dce8f0", rects:["#a8c0d0","#c8dce8","#e8f0f8"] },
      hot:                 { mood:"ecstatic",      field:"#d4401a", rects:["#f07820","#e04000","#a82800"] },
      cold:                { mood:"austere",       field:"#c0ccd8", rects:["#4a5a70","#708090","#2a3848"] },
      unknown:             { mood:"unknowable",    field:"#5a5a5a", rects:["#3a3a3a","#6a6060","#4a4848"] },
    };

    const WMO = {
      0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
      45:"Fog",48:"Freezing fog",51:"Light drizzle",53:"Moderate drizzle",55:"Dense drizzle",
      61:"Slight rain",63:"Moderate rain",65:"Heavy rain",71:"Slight snow",73:"Moderate snow",
      75:"Heavy snow",77:"Snow grains",80:"Slight showers",81:"Moderate showers",82:"Heavy showers",
      85:"Snow showers",86:"Heavy snow showers",95:"Thunderstorm",96:"Thunderstorm w/ hail",99:"Thunderstorm w/ heavy hail"
    };

    function getPalette(code, isDay, tempC) {
      if (tempC > 32) return PALETTES.hot;
      if (tempC < -5) return PALETTES.cold;
      if (code === 0) return isDay ? PALETTES.clear_day : PALETTES.clear_night;
      if (code <= 2)  return isDay ? PALETTES.partly_cloudy_day : PALETTES.partly_cloudy_night;
      if (code === 3) return PALETTES.overcast;
      if (code <= 49) return PALETTES.fog;
      if (code <= 57) return PALETTES.drizzle;
      if (code <= 67) return PALETTES.rain;
      if (code <= 77) return PALETTES.snow;
      if (code <= 82) return PALETTES.rain;
      if (code <= 86) return PALETTES.snow;
      if (code <= 99) return PALETTES.thunderstorm;
      return PALETTES.overcast;
    }

    function hexRgb(h) {
      return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    }

    // Shift a color slightly — varies hue/brightness within a range
    function shiftColor(hex, amount) {
      let [r,g,b] = hexRgb(hex);
      const dr = (Math.random()-0.5)*2*amount;
      const dg = (Math.random()-0.5)*2*amount;
      const db = (Math.random()-0.5)*2*amount;
      r = Math.max(0,Math.min(255,r+dr));
      g = Math.max(0,Math.min(255,g+dg));
      b = Math.max(0,Math.min(255,b+db));
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
    }

    function boxBlurPass(data, out, width, height, radius, horizontal) {
      const r = Math.floor(radius);
      for (let a = 0; a < (horizontal ? height : width); a++) {
        for (let b = 0; b < (horizontal ? width : height); b++) {
          let rS=0,gS=0,bS=0,aS=0,count=0;
          for (let d = -r; d <= r; d++) {
            const nb = Math.min((horizontal?width:height)-1, Math.max(0, b+d));
            const i = horizontal ? (a*width+nb)*4 : (nb*width+a)*4;
            rS+=data[i]; gS+=data[i+1]; bS+=data[i+2]; aS+=data[i+3]; count++;
          }
          const i = horizontal ? (a*width+b)*4 : (b*width+a)*4;
          out[i]=rS/count; out[i+1]=gS/count; out[i+2]=bS/count; out[i+3]=aS/count;
        }
      }
    }

    function boxBlur(imageData, radius) {
      const { data, width, height } = imageData;
      const tmp = new Uint8ClampedArray(data.length);
      const out = new Uint8ClampedArray(data.length);
      boxBlurPass(data, tmp, width, height, radius, true);
      boxBlurPass(tmp, out, width, height, radius, false);
      return new ImageData(out, width, height);
    }

    function hexRgbArr(hex) {
      // handles both #rrggbb and rgb(...) strings
      if (hex.startsWith('rgb')) {
        return hex.replace(/[^\d,]/g,'').split(',').map(Number);
      }
      return hexRgb(hex);
    }

    function paintRect(ctx, x, y, w, h, color, softness, fieldColor) {
      const [r,g,b] = hexRgbArr(color);
      const [fr,fg,fb] = hexRgbArr(fieldColor);
      const blurRadius = Math.round(Math.min(w,h) * softness);
      const pad = blurRadius * 2 + 30;
      const ow = w + pad*2, oh = h + pad*2;

      const oc = document.createElement('canvas');
      oc.width = ow; oc.height = oh;
      const octx = oc.getContext('2d');

      // Rothko's method: 8-15 thin glazes built up. Each layer is mostly
      // transparent. The cumulative effect creates the inner glow.

      // ── Layer 1: very thin underwash, larger than final shape ─────────────
      // This creates the "halo" around the rectangle
      octx.fillStyle = `rgba(${r},${g},${b},0.15)`;
      octx.fillRect(pad - 10, pad - 10, w + 20, h + 20);

      // ── Layer 2: complementary undertone for luminosity ───────────────────
      // Slightly shifted hue underneath - this is what makes Rothko colors glow
      const undertone_r = Math.round((r + fr) / 2);
      const undertone_g = Math.round((g + fg) / 2);
      const undertone_b = Math.round((b + fb) / 2);
      octx.fillStyle = `rgba(${undertone_r},${undertone_g},${undertone_b},0.35)`;
      octx.fillRect(pad - 5, pad - 5, w + 10, h + 10);

      // ── Layer 3-8: many thin painterly washes ────────────────────────────
      // Each wash is a region of the rectangle painted with low opacity
      // in a slightly varied color. Builds up density unevenly.
      const numWashes = 12 + Math.floor(Math.random() * 8);
      for (let i = 0; i < numWashes; i++) {
        // Each wash covers a random irregular region
        const wx = pad + (Math.random() - 0.15) * w * 0.3;
        const wy = pad + (Math.random() - 0.15) * h * 0.3;
        const ww = w * (0.5 + Math.random() * 0.7);
        const wh = h * (0.5 + Math.random() * 0.7);

        // Slight color variation per wash
        const dr = (Math.random() - 0.5) * 35;
        const dg = (Math.random() - 0.5) * 35;
        const db = (Math.random() - 0.5) * 35;
        const wr = Math.max(0, Math.min(255, r + dr));
        const wg = Math.max(0, Math.min(255, g + dg));
        const wb = Math.max(0, Math.min(255, b + db));
        const alpha = 0.08 + Math.random() * 0.14;

        // Use a radial gradient so wash density falls off — looks like paint
        // settling rather than a hard-edged shape
        const cx = wx + ww/2;
        const cy2 = wy + wh/2;
        const grad = octx.createRadialGradient(cx, cy2, 0, cx, cy2, Math.max(ww, wh)/2);
        grad.addColorStop(0, `rgba(${Math.round(wr)},${Math.round(wg)},${Math.round(wb)},${alpha})`);
        grad.addColorStop(0.7, `rgba(${Math.round(wr)},${Math.round(wg)},${Math.round(wb)},${alpha * 0.5})`);
        grad.addColorStop(1, `rgba(${Math.round(wr)},${Math.round(wg)},${Math.round(wb)},0)`);
        octx.fillStyle = grad;
        octx.fillRect(pad, pad, w, h);
      }

      // ── Layer 9: horizontal brush strokes (drag marks) ───────────────────
      const numStrokes = 24 + Math.floor(Math.random() * 16);
      for (let i = 0; i < numStrokes; i++) {
        const sy = pad + Math.random() * h;
        const sh = 2 + Math.random() * 6;
        const sx = pad + (Math.random() - 0.3) * w * 0.2;
        const sw_ = w * (0.5 + Math.random() * 0.55);
        const dr = (Math.random()-0.5) * 40;
        const dg = (Math.random()-0.5) * 40;
        const db = (Math.random()-0.5) * 40;
        const alpha = 0.05 + Math.random() * 0.12;
        const sr = Math.max(0, Math.min(255, r + dr));
        const sg = Math.max(0, Math.min(255, g + dg));
        const sb = Math.max(0, Math.min(255, b + db));

        // Stroke fades along its length
        const grad = octx.createLinearGradient(sx, 0, sx + sw_, 0);
        grad.addColorStop(0, `rgba(${Math.round(sr)},${Math.round(sg)},${Math.round(sb)},0)`);
        grad.addColorStop(0.2 + Math.random()*0.3, `rgba(${Math.round(sr)},${Math.round(sg)},${Math.round(sb)},${alpha})`);
        grad.addColorStop(0.7 + Math.random()*0.2, `rgba(${Math.round(sr)},${Math.round(sg)},${Math.round(sb)},${alpha})`);
        grad.addColorStop(1, `rgba(${Math.round(sr)},${Math.round(sg)},${Math.round(sb)},0)`);
        octx.fillStyle = grad;
        octx.fillRect(sx, sy, sw_, sh);
      }

      // ── Layer 10: vertical drips ──────────────────────────────────────────
      const numDrips = 2 + Math.floor(Math.random() * 4);
      for (let i = 0; i < numDrips; i++) {
        const dx = pad + Math.random() * w;
        const dy = pad + Math.random() * h * 0.4;
        const dh = h * (0.15 + Math.random() * 0.5);
        const dw = 1 + Math.random() * 3;
        const alpha = 0.06 + Math.random() * 0.1;
        const grad = octx.createLinearGradient(0, dy, 0, dy + dh);
        grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
        grad.addColorStop(0.3, `rgba(${r},${g},${b},${alpha})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        octx.fillStyle = grad;
        octx.fillRect(dx, dy, dw, dh);
      }

      // ── Final mask: irregular soft edges ─────────────────────────────────
      const mc = document.createElement('canvas');
      mc.width = ow; mc.height = oh;
      const mctx = mc.getContext('2d');

      // Mask has irregular insets — each edge has variation along its length
      const insetTop    = blurRadius * (0.3 + Math.random() * 0.5);
      const insetBottom = blurRadius * (0.3 + Math.random() * 0.5);
      const insetLeft   = blurRadius * (0.15 + Math.random() * 0.25);
      const insetRight  = blurRadius * (0.15 + Math.random() * 0.25);
      mctx.fillStyle = '#fff';
      mctx.fillRect(pad + insetLeft, pad + insetTop, w - insetLeft - insetRight, h - insetTop - insetBottom);

      // Add irregular bites taken out of edges - makes them ragged not uniform
      mctx.globalCompositeOperation = 'destination-out';
      const numBites = 8 + Math.floor(Math.random() * 8);
      for (let i = 0; i < numBites; i++) {
        const side = Math.floor(Math.random() * 4);
        let bx, by, br;
        const biteSize = blurRadius * (0.4 + Math.random() * 0.8);
        if (side === 0) { // top
          bx = pad + Math.random() * w;
          by = pad + insetTop;
          br = biteSize;
        } else if (side === 1) { // right
          bx = pad + w - insetRight;
          by = pad + Math.random() * h;
          br = biteSize;
        } else if (side === 2) { // bottom
          bx = pad + Math.random() * w;
          by = pad + h - insetBottom;
          br = biteSize;
        } else { // left
          bx = pad + insetLeft;
          by = pad + Math.random() * h;
          br = biteSize;
        }
        const grad = mctx.createRadialGradient(bx, by, 0, bx, by, br);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        mctx.fillStyle = grad;
        mctx.fillRect(bx - br, by - br, br * 2, br * 2);
      }
      mctx.globalCompositeOperation = 'source-over';

      // Blur the mask for soft edges
      let mid = mctx.getImageData(0,0,ow,oh);
      mid = boxBlur(mid, blurRadius * 0.6);
      mid = boxBlur(mid, blurRadius * 0.4);
      mctx.putImageData(mid, 0, 0);

      // Apply mask
      octx.globalCompositeOperation = 'destination-in';
      octx.drawImage(mc, 0, 0);
      octx.globalCompositeOperation = 'source-over';

      // Stamp onto main canvas
      ctx.drawImage(oc, x - pad, y - pad);
    }

    function addGrain(ctx, w, h) {
      const id = ctx.getImageData(0,0,w,h);
      const d = id.data;
      // Heavier grain for a canvas-like texture
      for (let i=0;i<d.length;i+=4) {
        const n=(Math.random()-0.5)*28;
        d[i]=Math.max(0,Math.min(255,d[i]+n));
        d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
        d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
      }
      ctx.putImageData(id,0,0);
    }

    // Add a subtle horizontal linen texture to the whole canvas
    function addCanvasTexture(ctx, w, h) {
      const id = ctx.getImageData(0,0,w,h);
      const d = id.data;
      for (let y=0;y<h;y++) {
        // faint horizontal banding — linen weave
        const rowShift = Math.sin(y * 0.9) * 3 + (Math.random()-0.5) * 2;
        for (let x=0;x<w;x++) {
          const i=(y*w+x)*4;
          const v = rowShift + (Math.random()-0.5)*6;
          d[i]=Math.max(0,Math.min(255,d[i]+v));
          d[i+1]=Math.max(0,Math.min(255,d[i+1]+v));
          d[i+2]=Math.max(0,Math.min(255,d[i+2]+v));
        }
      }
      ctx.putImageData(id,0,0);
    }

    function addGrain(ctx, w, h) {
      const id = ctx.getImageData(0,0,w,h);
      const d = id.data;
      for (let i=0;i<d.length;i+=4) {
        const n=(Math.random()-0.5)*22;
        d[i]=Math.max(0,Math.min(255,d[i]+n));
        d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
        d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
      }
      ctx.putImageData(id,0,0);
    }

    let currentPalette = null;

    function paint(palette) {
      const canvas = document.getElementById('canvas');
      const W=600, H=800;
      canvas.width=W; canvas.height=H;
      const ctx = canvas.getContext('2d');

      // Field: shift the background color slightly each time
      const fieldShifted = shiftColor(palette.field, 18);
      const [fr,fg,fb] = hexRgb(palette.field);
      const bg = ctx.createLinearGradient(0,0,0,H);
      // Randomise which end is lighter/darker
      const flip = Math.random() > 0.5;
      bg.addColorStop(0, shiftColor(palette.field, flip ? 24 : 8));
      bg.addColorStop(0.5, shiftColor(palette.field, 10));
      bg.addColorStop(1, shiftColor(palette.field, flip ? 8 : 24));
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,W,H);

      // Decide composition: 2 or 3 rects, weighted toward 3
      const n = Math.random() < 0.3 ? 2 : 3;
      const rects = palette.rects.slice(0, n);

      // Randomise order of rects
      if (Math.random() > 0.5) rects.reverse();

      // Random proportions — top-heavy, bottom-heavy, or balanced
      const totalH = H * (0.68 + Math.random() * 0.14); // 68–82% of canvas
      const pad = W * (0.06 + Math.random() * 0.06);     // 6–12% side padding
      const rw = W - pad*2;
      const gap = H * (0.005 + Math.random() * 0.008);   // very tight, almost touching

      let heights;
      if (n === 2) {
        const split = 0.35 + Math.random() * 0.3; // 35–65%
        heights = [totalH * split, totalH * (1-split)];
      } else {
        // Three rects: vary the weight distribution
        const a = 0.15 + Math.random() * 0.2;
        const b = 0.25 + Math.random() * 0.2;
        const c = 1 - a - b;
        heights = [totalH*a, totalH*b, totalH*c];
        if (Math.random() > 0.5) heights.sort((x,y)=>x-y); // small→large
        else heights.sort((x,y)=>y-x);                      // large→small
      }

      // Vertical position: slightly high, centered, or slightly low
      const vBias = (Math.random() - 0.5) * H * 0.08;
      const used = heights.reduce((a,b)=>a+b,0) + gap*(n-1);
      let cy = (H - used) / 2 + vBias;

      for (let i=0; i<n; i++) {
        const col = shiftColor(rects[i], 28);
        const softness = 0.10 + Math.random() * 0.10;
        paintRect(ctx, pad, cy, rw, heights[i], col, softness, palette.field);
        cy += heights[i] + gap;
      }

      addGrain(ctx, W, H);

      canvas.style.display='block';
      document.getElementById('status-msg').style.display='none';
      document.getElementById('error-detail').style.display='none';
      document.getElementById('footer-data').style.display='flex';
    }

    function repaint() {
      if (currentPalette) {
        const canvas = document.getElementById('canvas');
        canvas.style.opacity = '0';
        setTimeout(() => {
          paint(currentPalette);
          canvas.style.opacity = '1';
        }, 300);
      } else {
        init();
      }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('time-line').textContent =
        now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      document.getElementById('date-line').textContent =
        now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    }

    async function init() {
      document.getElementById('canvas').style.display='none';
      document.getElementById('footer-data').style.display='none';
      document.getElementById('error-detail').style.display='none';
      document.getElementById('status-msg').style.display='inline';
      document.getElementById('status-msg').textContent='Reading the sky…';
      document.getElementById('temp-line').textContent='';

      updateClock();

      const url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude=40.4406&longitude=-79.9959' +
        '&current=temperature_2m,weather_code,is_day' +
        '&temperature_unit=celsius&timezone=America%2FNew_York';

      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const c = data.current;
        const tempC = c.temperature_2m;
        const tempF = Math.round(tempC * 9/5 + 32);
        const code  = c.weather_code;
        const isDay = c.is_day === 1;

        document.getElementById('temp-line').textContent = `${tempF}°F · ${Math.round(tempC)}°C`;
        document.getElementById('condition-val').textContent = WMO[code] || `Code ${code}`;

        currentPalette = getPalette(code, isDay, tempC);
        document.getElementById('mood-val').textContent = currentPalette.mood;
        paint(currentPalette);

      } catch(e) {
        currentPalette = PALETTES.unknown;
        document.getElementById('status-msg').style.display='none';
        document.getElementById('error-detail').style.display='block';
        document.getElementById('error-detail').textContent = 'Weather unavailable — painting from memory.';
        document.getElementById('condition-val').textContent = '—';
        document.getElementById('mood-val').textContent = 'unknowable';
        document.getElementById('footer-data').style.display='flex';
        paint(currentPalette);
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        Promise.all(regs.map(r => r.unregister())).then(() => {
          navigator.serviceWorker.register('sw.js');
        });
      });
    }

    setInterval(updateClock, 30000);
    init();
  </script>
</body>
</html>
