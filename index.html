<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Rothko PGH" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Rothko · Pittsburgh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e0d8cc;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      overflow: hidden;
    }

    header {
      width: 100%;
      padding: 20px 24px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .location-line {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 3px;
    }

    .date-line {
      font-size: 13px;
      color: #999;
    }

    .time-line {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.02em;
      text-align: right;
    }

    .temp-line {
      font-size: 13px;
      color: #999;
      text-align: right;
      margin-top: 2px;
    }

    #painting-wrap {
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #painting-wrap canvas {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      border-radius: 2px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.75), 0 2px 12px rgba(0,0,0,0.5);
    }

    #status-msg {
      color: #555;
      font-size: 13px;
      letter-spacing: 0.08em;
      font-style: italic;
    }

    footer {
      width: 100%;
      padding: 14px 24px 24px;
      border-top: 1px solid #1e1e1e;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4px;
    }

    .footer-value {
      font-size: 15px;
      color: #ccc;
    }

    .footer-value.italic {
      font-style: italic;
    }

    .byline {
      margin-top: 12px;
      font-size: 10px;
      color: #383838;
      letter-spacing: 0.06em;
      text-align: center;
    }

    #refresh-btn {
      display: block;
      margin: 10px auto 0;
      background: none;
      border: 1px solid #333;
      color: #666;
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 1px;
    }

    #refresh-btn:active { background: #1a1a1a; }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="location-line">Pittsburgh, PA</div>
      <div class="date-line" id="date-line">—</div>
    </div>
    <div>
      <div class="time-line" id="time-line">—</div>
      <div class="temp-line" id="temp-line"></div>
    </div>
  </header>

  <div id="painting-wrap">
    <span id="status-msg">Reading the sky…</span>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <footer>
    <div class="footer-row" id="footer-data" style="display:none;">
      <div>
        <div class="footer-label">Condition</div>
        <div class="footer-value" id="condition-val">—</div>
      </div>
      <div style="text-align:right;">
        <div class="footer-label">Mood register</div>
        <div class="footer-value italic" id="mood-val">—</div>
      </div>
    </div>
    <div class="byline">Mark Rothko · American, 1903–1970 · Inspired by rothko.joonas.wtf</div>
    <button id="refresh-btn" onclick="init()">Refresh</button>
  </footer>

  <script>
    // ── Palettes ──────────────────────────────────────────────────────────────
    const PALETTES = {
      clear_day:            { mood: "luminous",      field: "#e8d5b0", rects: ["#c94f2a","#e8892a","#f2c96e"] },
      clear_night:          { mood: "nocturnal",     field: "#1a1228", rects: ["#2d1f4a","#5c2d6e","#8b3a62"] },
      partly_cloudy_day:    { mood: "contemplative", field: "#c9bfad", rects: ["#7a5c4a","#b8823c","#d4a86a"] },
      partly_cloudy_night:  { mood: "somber",        field: "#1e1e2e", rects: ["#3a3050","#5a4a6a","#2e2040"] },
      overcast:             { mood: "heavy",         field: "#8a8a8a", rects: ["#4a4040","#6a5a5a","#3a3030"] },
      fog:                  { mood: "ethereal",      field: "#b8c0c8", rects: ["#7a8898","#9aaab8","#c8d4dc"] },
      drizzle:              { mood: "melancholic",   field: "#6a7a8a", rects: ["#3a5a6a","#4a6a7a","#8a9aaa"] },
      rain:                 { mood: "elemental",     field: "#3a4a5a", rects: ["#1a2a3a","#2a3a4a","#5a6a7a"] },
      thunderstorm:         { mood: "doom",          field: "#1a1a2a", rects: ["#0a0a1a","#3a1a0a","#4a2a1a"] },
      snow:                 { mood: "hushed",        field: "#dce8f0", rects: ["#a8c0d0","#c8dce8","#e8f0f8"] },
      hot:                  { mood: "ecstatic",      field: "#d4401a", rects: ["#f07820","#e04000","#a82800"] },
      cold:                 { mood: "austere",       field: "#c0ccd8", rects: ["#4a5a70","#708090","#2a3848"] },
    };

    const WMO = {
      0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
      45:"Fog",48:"Freezing fog",51:"Light drizzle",53:"Moderate drizzle",55:"Dense drizzle",
      61:"Slight rain",63:"Moderate rain",65:"Heavy rain",71:"Slight snow",73:"Moderate snow",
      75:"Heavy snow",77:"Snow grains",80:"Slight showers",81:"Moderate showers",82:"Heavy showers",
      85:"Snow showers",86:"Heavy snow showers",95:"Thunderstorm",96:"Thunderstorm w/ hail",99:"Thunderstorm w/ heavy hail"
    };

    function getPalette(code, isDay, tempC) {
      if (tempC > 32) return PALETTES.hot;
      if (tempC < -5) return PALETTES.cold;
      if (code === 0) return isDay ? PALETTES.clear_day : PALETTES.clear_night;
      if (code <= 2)  return isDay ? PALETTES.partly_cloudy_day : PALETTES.partly_cloudy_night;
      if (code === 3) return PALETTES.overcast;
      if (code <= 49) return PALETTES.fog;
      if (code <= 57) return PALETTES.drizzle;
      if (code <= 67) return PALETTES.rain;
      if (code <= 77) return PALETTES.snow;
      if (code <= 82) return PALETTES.rain;
      if (code <= 86) return PALETTES.snow;
      if (code <= 99) return PALETTES.thunderstorm;
      return PALETTES.overcast;
    }

    // ── Canvas drawing ────────────────────────────────────────────────────────
    function hexRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }

    function softRect(ctx, x, y, w, h, color, softness) {
      const [r,g,b] = hexRgb(color);
      const m = Math.min(w,h) * softness;
      ctx.fillStyle = color;
      ctx.fillRect(x+m, y+m, w-m*2, h-m*2);
      const sides = [
        [0,y,0,y+m*2, x,y,w,m*2],
        [0,y+h-m*2,0,y+h, x,y+h-m*2,w,m*2],
        [x,0,x+m*2,0, x,y,m*2,h],
        [x+w-m*2,0,x+w,0, x+w-m*2,y,m*2,h],
      ];
      sides.forEach(([x1,y1,x2,y2,fx,fy,fw,fh],i) => {
        let g = i<2 ? ctx.createLinearGradient(0,y1,0,y2) : ctx.createLinearGradient(x1,0,x2,0);
        g.addColorStop(i%2===0?0:1, `rgba(${r},${g},${b},0)`);
        g.addColorStop(i%2===0?1:0, `rgba(${r},${g},${b},1)`);
        ctx.fillStyle = g;
        ctx.fillRect(fx,fy,fw,fh);
      });
    }

    function addGrain(ctx, w, h) {
      const id = ctx.getImageData(0,0,w,h);
      const d = id.data;
      for (let i=0; i<d.length; i+=4) {
        const n = (Math.random()-0.5)*18;
        d[i]   = Math.max(0,Math.min(255,d[i]+n));
        d[i+1] = Math.max(0,Math.min(255,d[i+1]+n));
        d[i+2] = Math.max(0,Math.min(255,d[i+2]+n));
      }
      ctx.putImageData(id,0,0);
    }

    function paint(palette) {
      const canvas = document.getElementById('canvas');
      const W = 600, H = 800;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      const [fr,fg,fb] = hexRgb(palette.field);
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, `rgb(${Math.min(255,fr+14)},${Math.min(255,fg+14)},${Math.min(255,fb+14)})`);
      bg.addColorStop(0.5, palette.field);
      bg.addColorStop(1, `rgb(${Math.max(0,fr-14)},${Math.max(0,fg-14)},${Math.max(0,fb-14)})`);
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,W,H);

      const rects = palette.rects;
      const n = rects.length;
      const pad = W * 0.08;
      const rw = W - pad*2;
      const gap = H * 0.03;
      const totalH = H * 0.76;
      const heights = n === 2 ? [totalH*0.38, totalH*0.52] : [totalH*0.22, totalH*0.35, totalH*0.33];
      const used = heights.reduce((a,b)=>a+b,0) + gap*(n-1);
      let cy = (H - used) / 2;

      for (let i=0; i<n; i++) {
        softRect(ctx, pad, cy, rw, heights[i], rects[i], 0.13 + Math.random()*0.06);
        cy += heights[i] + gap;
      }
      addGrain(ctx, W, H);

      canvas.style.display = 'block';
      document.getElementById('status-msg').style.display = 'none';
      document.getElementById('footer-data').style.display = 'flex';
    }

    // ── Clock ─────────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('time-line').textContent =
        now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      document.getElementById('date-line').textContent =
        now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    }

    // ── Weather fetch ─────────────────────────────────────────────────────────
    async function init() {
      document.getElementById('canvas').style.display = 'none';
      document.getElementById('footer-data').style.display = 'none';
      document.getElementById('status-msg').style.display = 'inline';
      document.getElementById('status-msg').textContent = 'Reading the sky…';

      updateClock();
      setInterval(updateClock, 30000);

      try {
        const url = 'https://api.open-meteo.com/v1/forecast' +
          '?latitude=40.4406&longitude=-79.9959' +
          '&current=temperature_2m,weather_code,is_day' +
          '&temperature_unit=celsius&timezone=America%2FNew_York';

        const res = await fetch(url);
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        const c = data.current;

        const tempC = c.temperature_2m;
        const tempF = Math.round(tempC * 9/5 + 32);
        const code  = c.weather_code;
        const isDay = c.is_day === 1;

        document.getElementById('temp-line').textContent = `${tempF}°F · ${Math.round(tempC)}°C`;
        document.getElementById('condition-val').textContent = WMO[code] || 'Unknown';

        const palette = getPalette(code, isDay, tempC);
        document.getElementById('mood-val').textContent = palette.mood;

        paint(palette);

      } catch(e) {
        document.getElementById('status-msg').textContent =
          'Could not reach weather service. Check your connection.';
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    init();
  </script>
</body>
</html>
